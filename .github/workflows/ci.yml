name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short
      - name: Import check
        run: |
          python -c "
          from thinkrouter import ThinkRouter, Tier, TIER_TOKEN_BUDGETS
          from thinkrouter import HeuristicClassifier, UsageTracker, Config
          from thinkrouter.exceptions import ThinkRouterError, ProviderError
          clf = HeuristicClassifier()
          r   = clf.predict('What is 2+2?')
          assert r.tier == Tier.NO_THINK and r.token_budget == 50
          print('OK tier=%s budget=%s' % (r.tier.name, r.token_budget))
          "
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install ruff
      - run: ruff check thinkrouter/ --select E,F,W
