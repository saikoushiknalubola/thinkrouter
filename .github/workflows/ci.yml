name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check import works
        run: |
          python -c "
          from thinkrouter import ThinkRouter, Tier, TIER_TOKEN_BUDGETS
          from thinkrouter import HeuristicClassifier, UsageTracker
          clf = HeuristicClassifier()
          r   = clf.predict('What is 2+2?')
          assert r.tier == Tier.NO_THINK
          assert r.token_budget == 50
          print('Import check passed — tier:', r.tier.name, '| budget:', r.token_budget)
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check thinkrouter/ --select E,F,W
